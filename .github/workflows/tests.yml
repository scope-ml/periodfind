name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  cpu-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: pip install numpy cython pytest maturin

      - name: Build Rust CPU backend
        working-directory: rust
        run: maturin develop --release

      - name: Run unit and CPU tests
        run: pytest tests/test_periodfind.py tests/test_cpu_standalone.py -v

  cuda-tests:
    runs-on: [self-hosted, gpu]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: pip install numpy cython pytest maturin

      - name: Build CUDA extensions
        run: pip install -e .

      - name: Build Rust CPU backend
        working-directory: rust
        run: maturin develop --release

      - name: Run full test suite
        run: pytest tests/ -v --ignore=tests/bench_cuda_opts.py --ignore=tests/bench_cpu_vs_cuda.py
